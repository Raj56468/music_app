<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music-App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="left-half">
        <div class="logo">
          <i class="fa-brands fa-napster"></i>
        </div>
        <div class="p-tagv">
          <p class="p-tag">Music</p>
        </div>
      </div>
      <div class="middle-half">
        <div class="search-bar">
          <div class="search-icon">
            <i class="fa-brands fa-searchengin"></i>
          </div>
          <input
            type="text"
            class="input-box"
            placeholder="What do you wanna listen?"
          />
          <div class="browse"><i class="fa-regular fa-folder-closed"></i></div>
        </div>
      </div>
      <div class="right-half">
        <div class="pfp">
          <div class="pfp-pic"><i class="fa-brands fa-grav"></i></div>
          <div class="pfp-name">User</div>
        </div>
      </div>
    </nav>
  </body>
</html>
